<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Demandas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <header>
    <h1>Sistema de Demandas</h1>
  </header>

  <main>

    <!-- FORMULÁRIO DE CADASTRO -->
    <section class="card" id="formulario">
      <h2>Nova Demanda</h2>

      <div class="form-row">
        <div class="form-group">
          <label for="titulo">Título *</label>
          <input type="text" id="titulo" placeholder="Ex: Corrigir bug no login" />
        </div>
        <div class="form-group">
          <label for="responsavel">Responsável *</label>
          <input type="text" id="responsavel" placeholder="Nome do responsável" />
        </div>
      </div>

      <div class="form-group">
        <label for="descricao">Descrição</label>
        <textarea id="descricao" placeholder="Descreva a demanda..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status">
            <option value="Aberta">Aberta</option>
            <option value="Em andamento">Em andamento</option>
            <option value="Concluída">Concluída</option>
          </select>
        </div>
        <div class="form-group">
          <label for="prioridade">Prioridade</label>
          <select id="prioridade">
            <option value="Alta">Alta</option>
            <option value="Média">Média</option>
            <option value="Baixa">Baixa</option>
          </select>
        </div>
      </div>

      <button id="btn-cadastrar">Cadastrar Demanda</button>
    </section>

    <!-- LISTAGEM DE DEMANDAS -->
    <section class="card" id="listagem">
      <h2>Demandas Cadastradas</h2>
      <table id="tabela-demandas">
        <thead>
          <tr>
            <th>#</th>
            <th>Título</th>
            <th>Responsável</th>
            <th>Status</th>
            <th>Prioridade</th>
            <th>Data</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="corpo-tabela">
          <tr><td colspan="7" class="vazio">Nenhuma demanda cadastrada.</td></tr>
        </tbody>
      </table>
    </section>

  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
